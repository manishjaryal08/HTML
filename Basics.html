<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!------------------------------------------------------------------------
    #Tags  in html 
    -> tags are the html keywords enclosed in angular brackets( <keyword>) 
    -> they are used to specify how the content should be displayed over webpage 
    
    Types of tags in html
    1. paired tags - have both opening and closing
    2. empty /  void tags - don't have closing tag
    ------------------------------------------------------------------------>

    <!-----------------------------------------------------------------------

    #Elements in html
    ->Element = opening tag + content + closing tag
    
    #type of elements
    
    1. Inline elemnts =>
    -> only take the space as much as they require
    -> can not set the height and width of the elements
    -> image tag, span tag etc
    
     2. Block elements =>
    ->take the complete width of the container
    ->start form new line
    ->can set the height and width
    ->div , heading , paragraph
   ------------------------------------------------------------------------------->

    <!------------------------------------------------------------------------------ 
    #Attributes:-
    ->properties of tags so that they can bheave in desired manner
    ->attributes consist of name and value seprated by equal sign value is usually quoted in ""
    ->applied on opening tag
    ------------------------------------------------------------------------------->
  </body>
</html>
